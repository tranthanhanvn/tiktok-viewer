<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TikTok Downloader</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
font-size:16px;
margin-top:10px;
border:none;
border-radius:6px;
background:#ff0050;
color:white;
cursor:pointer;
}

button:hover{
background:#e60045;
}

#video{
margin-top:20px;
}

iframe{
width:100%;
height:500px;
border:none;
}

.download{
display:block;
margin-top:20px;
padding:12px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h2>TikTok Downloader</h2>

<input id="link" placeholder="Paste TikTok link">

<button onclick="showVideo()">Preview Video</button>

<button onclick="downloadVideo()">Download Video</button>

<div id="video"></div>

<div id="download"></div>

</div>

<script>

function showVideo(){

let url=document.getElementById("link").value.trim();

let match=url.match(/video\/(\d+)/);

if(!match){
alert("Link TikTok không hợp lệ");
return;
}

let id=match[1];

document.getElementById("video").innerHTML=
`<iframe src="https://www.tiktok.com/embed/v2/${id}" allowfullscreen></iframe>`;

}

async function downloadVideo(){

let url=document.getElementById("link").value;

let api="https://tikwm.com/api/?url="+encodeURIComponent(url);

try{

let res=await fetch(api);

let data=await res.json();

let video=data.data.play;

document.getElementById("download").innerHTML=
`<a class="download" href="${video}" target="_blank">⬇ Download Video</a>`;

}catch(e){

alert("Không lấy được video");

}

}

</script>

</body>
</html>
