<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:95%;
max-width:420px;
background:#1c1c1c;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:15px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.preview{
background:#ff0050;
color:white;
}

.download{
background:#00c853;
color:white;
}

video{
width:100%;
margin-top:15px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>TikTok Downloader</h2>

<input id="url" placeholder="Paste link TikTok">

<button class="preview" onclick="preview()">Preview Video</button>

<button class="download" onclick="download()">Download Video</button>

<div id="player"></div>

</div>

<script>

function getID(url){

let match=url.match(/video\/(\d+)/);

if(match) return match[1];

return null;

}

function preview(){

let url=document.getElementById("url").value.trim();

let id=getID(url);

if(!id){
alert("Link TikTok không hợp lệ");
return;
}

let embed=`https://www.tiktok.com/embed/v2/${id}`;

document.getElementById("player").innerHTML=

`<iframe src="${embed}" width="100%" height="500" frameborder="0"></iframe>`;

}

function download(){

let url=document.getElementById("url").value.trim();

if(!url){
alert("Dán link TikTok trước");
return;
}

let api="https://tikwm.com/?url="+encodeURIComponent(url);

window.open(api,"_blank");

}

</script>

</body>
</html>
