<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TikTok Downloader</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:95%;
max-width:420px;
background:#1c1c1c;
padding:25px;
border-radius:12px;
text-align:center;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
font-size:16px;
}

.preview{background:#ff0050;color:white;}
.download{background:#00c853;color:white;}

video{
width:100%;
margin-top:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>TikTok Downloader</h2>

<input id="url" placeholder="Paste link TikTok">

<button class="preview" onclick="preview()">Preview Video</button>

<button class="download" onclick="getVideo()">Get Download Link</button>

<div id="player"></div>

<a id="downloadBtn" style="display:none"></a>

</div>

<script>

function getID(url){

let match=url.match(/video\/(\d+)/);

return match?match[1]:null;

}

function preview(){

let url=document.getElementById("url").value.trim();

let id=getID(url);

if(!id){

alert("Link TikTok không hợp lệ");

return;

}

document.getElementById("player").innerHTML=

`<iframe src="https://www.tiktok.com/embed/v2/${id}" width="100%" height="500"></iframe>`;

}

async function getVideo(){

let url=document.getElementById("url").value.trim();

if(!url){

alert("Dán link TikTok trước");

return;

}

let api="https://www.tikwm.com/api/?url="+encodeURIComponent(url);

let res=await fetch(api);

let data=await res.json();

if(data.data && data.data.play){

let video=data.data.play;

let btn=document.getElementById("downloadBtn");

btn.href=video;

btn.innerText="Download Video";

btn.style.display="block";

btn.className="download";

btn.setAttribute("download","tiktok-video.mp4");

}

else{

alert("Không lấy được video");

}

}

</script>

</body>
</html>
