<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TikTok Downloader</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:40px;
}

input{
width:300px;
padding:10px;
font-size:16px;
}

button{
padding:10px 15px;
font-size:16px;
margin:5px;
cursor:pointer;
}

#video{
margin-top:20px;
}

#download{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<h2>TikTok Video Viewer & Downloader</h2>

<input id="link" placeholder="Paste TikTok link">

<br><br>

<button onclick="showVideo()">Show Video</button>

<button onclick="downloadVideo()">Download Video</button>

<div id="video"></div>

<div id="download"></div>

<script>

/* show video */

function showVideo(){

let url=document.getElementById("link").value.trim();

if(!url){
alert("Vui lòng dán link TikTok");
return;
}

let match=url.match(/video\/(\d+)/);

if(!match){
alert("Link TikTok không hợp lệ");
return;
}

let id=match[1];

document.getElementById("video").innerHTML=

`<iframe 
src="https://www.tiktok.com/embed/v2/${id}"
width="325"
height="580"
frameborder="0"
allowfullscreen>
</iframe>`;

}

/* download video */

async function downloadVideo(){

let url=document.getElementById("link").value;

let api="https://tikwm.com/api/?url="+encodeURIComponent(url);

try{

let res=await fetch(api);

let data=await res.json();

let video=data.data.play;

document.getElementById("download").innerHTML=

`<a href="${video}" target="_blank">⬇ Download Video</a>`;

}catch(e){

alert("Không lấy được video");

}

}

</script>

</body>
</html>
