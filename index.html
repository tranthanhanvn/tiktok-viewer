<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<h2>TikTok Video Viewer</h2>

<input id="link" placeholder="Paste TikTok link">

<button onclick="showVideo()">Show Video</button>

<button onclick="downloadVideo()">Download Video</button>

<div id="video"></div>

<div id="download"></div>
  
<style>
body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

input{
width:400px;
padding:10px;
}

button{
padding:10px 20px;
cursor:pointer;
margin-left:5px;
}
</style>

</head>

<body>

<script>

function showVideo(){

let url = document.getElementById("link").value.trim();

if(!url){
alert("Vui lòng dán link TikTok");
return;
}

if(url.includes("vt.tiktok.com") || url.includes("vm.tiktok.com")){
document.getElementById("video").innerHTML =
`<iframe src="${url}" width="325" height="580" frameborder="0" allowfullscreen></iframe>`;
return;
}

if(url.includes("/video/")){

let id = url.split("/video/")[1].split("?")[0];

document.getElementById("video").innerHTML =
`<iframe src="https://www.tiktok.com/embed/v2/${id}"
width="325"
height="580"
frameborder="0"
allowfullscreen></iframe>`;

}else{
alert("Link TikTok không hợp lệ");
}

}

async function downloadVideo(){

let url = document.getElementById("link").value;

let api = "https://tikwm.com/api/?url=" + encodeURIComponent(url);

let res = await fetch(api);
let data = await res.json();

let video = data.data.play;

window.open(video,"_blank");

}

let id = url.split("/video/")[1].split("?")[0];

let videoUrl = "https://www.tikwm.com/video/media/hdplay/" + id + ".mp4";

/* tạo link download */
let a = document.createElement("a");
a.href = videoUrl;
a.target = "_blank";
a.rel = "noopener";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

}



</script>
<script async src="https://www.tiktok.com/embed.js"></script>

</body>
</html>
