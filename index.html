<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<h2>TikTok Video Viewer</h2>

<input id="link" placeholder="Paste TikTok link">

<button onclick="showVideo()">Show Video</button>

<button onclick="downloadVideo()">Download Video</button>

<div id="video"></div>

<div id="download"></div>
  
<style>
body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

input{
width:400px;
padding:10px;
}

button{
padding:10px 20px;
cursor:pointer;
margin-left:5px;
}
</style>

</head>

<body>

<script>

function showVideo(){

let url = document.getElementById("link").value;

let id = url.split("/video/")[1].split("?")[0];

document.getElementById("video").innerHTML =
`<iframe 
src="https://www.tiktok.com/embed/v2/${id}" 
width="325" 
height="580" 
frameborder="0" 
allowfullscreen>
</iframe>`;

}

function downloadVideo(){

let url = document.getElementById("link").value;

if(!url.includes("/video/")){
alert("Link TikTok không hợp lệ");
return;
}

let id = url.split("/video/")[1].split("?")[0];

let videoUrl = "https://www.tikwm.com/video/media/hdplay/" + id + ".mp4";

/* tạo link download */
let a = document.createElement("a");
a.href = videoUrl;
a.target = "_blank";
a.rel = "noopener";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

}



</script>
<script async src="https://www.tiktok.com/embed.js"></script>

</body>
</html>
